<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#09090f;color:#e8dfc8;font-family:Georgia,serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px;background-image:repeating-linear-gradient(45deg,transparent,transparent 50px,rgba(201,168,76,.012) 50px,rgba(201,168,76,.012) 51px),repeating-linear-gradient(-45deg,transparent,transparent 50px,rgba(201,168,76,.012) 50px,rgba(201,168,76,.012) 51px)}

.divider{height:1px;margin:0 22px;background:linear-gradient(90deg,transparent,rgba(201,168,76,.12),transparent)}
.footer{display:flex;justify-content:space-between;align-items:center;padding:9px 22px;background:#111220;border-top:1px solid rgba(201,168,76,.06)}
.fnote{font-size:8px;color:#6b6050;letter-spacing:1px;line-height:1.7}

.spinner{width:30px;height:30px;border:2px solid rgba(201,168,76,.15);border-top-color:#c9a84c;border-radius:50%;animation:spin .9s linear infinite;margin:0 auto 14px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading{padding:48px 22px;text-align:center}
.loading-text{font-size:9px;letter-spacing:3px;color:#6b6050;text-transform:uppercase}
.warn{padding:12px 22px;background:rgba(180,60,60,.08);border-bottom:1px solid rgba(180,60,60,.15);font-size:11px;color:#c07070;text-align:center;line-height:1.6}

<body>
<div class="card">

  <div class="header">
    <div class="bismillah">Ø¨ÙØ³ÙÙÙ Ø§ÙÙÙÙÙÙ Ø§ÙØ±ÙÙØ­ÙÙÙ°ÙÙ Ø§ÙØ±ÙÙØ­ÙÙÙÙ</div>
    <div class="title">Prayer Times</div>

</div>

<script>
function toRad(d){return d*Math.PI/180}
function toDeg(r){return r*180/Math.PI}
function fixHour(h){return h-24*Math.floor(h/24)}

function julianDay(date){
  var y=date.getFullYear(),m=date.getMonth()+1,d=date.getDate();
  var A=Math.floor((14-m)/12),Y=y+4800-A,M=m+12*A-3;
  return d+Math.floor((153*M+2)/5)+365*Y+Math.floor(Y/4)-Math.floor(Y/100)+Math.floor(Y/400)-32045;
}

function sunInfo(jd){
  var D=jd-2451545.0;
  var g=toRad(357.529+0.98560028*D);
  var q=280.459+0.98564736*D;
  var L=toRad(q+1.915*Math.sin(g)+0.020*Math.sin(2*g));
  var e=toRad(23.439-0.00000036*D);
  var RA=toDeg(Math.atan2(Math.cos(e)*Math.sin(L),Math.cos(L)))/15;
  var Lh=(toDeg(L)%360)/15;
  RA=RA-24*Math.floor((RA-Lh+0.5)/24);
  var dec=Math.asin(Math.sin(e)*Math.sin(L));
  var EqT=(q%360)/15-RA;
  return{dec:dec,EqT:EqT};
}

function hourAngle(angleDeg,dec,lat){
  var val=(-Math.sin(toRad(angleDeg))-Math.sin(toRad(lat))*Math.sin(dec))/(Math.cos(toRad(lat))*Math.cos(dec));
  if(val<-1||val>1)return null;
  return toDeg(Math.acos(val))/15;
}

function asrHA(shadow,dec,lat){
  var A=Math.atan(1/(shadow+Math.tan(Math.abs(toRad(lat)-dec))));
  var val=(Math.sin(A)-Math.sin(toRad(lat))*Math.sin(dec))/(Math.cos(toRad(lat))*Math.cos(dec));
  if(val<-1||val>1)return null;
  return toDeg(Math.acos(val))/15;
}

function calcTimes(date,lat,lng,tz){
  var jd=julianDay(date),si=sunInfo(jd);
  var transit=12+tz-lng/15-si.EqT;
  var fajrH=hourAngle(18.5,si.dec,lat),srH=hourAngle(0.833,si.dec,lat);
  var aH=asrHA(2,si.dec,lat),magH=hourAngle(0.833,si.dec,lat);
  var fajr=fajrH!=null?transit-fajrH:null;
  var sunrise=srH!=null?transit-srH:null;
  var dhuhr=transit;
  var asr=aH!=null?transit+aH:null;
  var maghrib=magH!=null?transit+magH:null;
  var isha=maghrib!=null?maghrib+1.5:null;
  var tom=new Date(date);tom.setDate(tom.getDate()+1);
  var si2=sunInfo(julianDay(tom));
  var transit2=12+tz-lng/15-si2.EqT;
  var fH2=hourAngle(18.5,si2.dec,lat);
  var nf=fH2!=null?transit2-fH2:null;
  var midnight=null,lastThird=null;
  if(maghrib!=null&&nf!=null){var nf2=nf+24;midnight=fixHour((maghrib+nf2)/2);lastThird=fixHour(maghrib+(nf2-maghrib)*2/3);}
  return{fajr:fajr,sunrise:sunrise,dhuhr:dhuhr,asr:asr,maghrib:maghrib,isha:isha,midnight:midnight,lastThird:lastThird};
}

function fmt12(h){
  if(h==null)return{disp:'--:--',ap:''};
  h=fixHour(h);
  var total=Math.round(h*60),hh=Math.floor(total/60)%24,mm=total%60;
  var ap=hh>=12?'PM':'AM';hh=hh%12||12;
  return{disp:hh+':'+(mm<10?'0':'')+mm,ap:ap};
}

function toNM(h){if(h==null)return -1;return Math.round(fixHour(h)*60)%(24*60);}

function getHijri(date){
  var y=date.getFullYear(),m=date.getMonth()+1,d=date.getDate();
  var A=Math.floor((14-m)/12),Y=y+4800-A,M=m+12*A-3;
  var jd=d+Math.floor((153*M+2)/5)+365*Y+Math.floor(Y/4)-Math.floor(Y/100)+Math.floor(Y/400)-32045;
  var l=jd-1948440+10632,n=Math.floor((l-1)/10631),l2=l-10631*n+354;
  var j=Math.floor((10985-l2)/5316)*Math.floor((50*l2)/17719)+Math.floor(l2/5670)*Math.floor((43*l2)/15238);
  var l3=l2-Math.floor((30-j)/15)*Math.floor((17719*j)/50)-Math.floor(j/16)*Math.floor((15238*j)/43)+29;
  var hm=Math.floor((24*l3)/709),hd=l3-Math.floor((709*hm)/24),hy=30*n+j-30;
  var HM=["Muharram","Safar","Rabi' al-Awwal","Rabi' al-Thani","Jumada al-Awwal","Jumada al-Thani","Rajab","Sha'ban","Ramadan","Shawwal","Dhul Qa'dah","Dhul Hijjah"];
  return{day:hd,month:HM[hm-1]||'',year:hy};
}

var DAYS=["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
var MONTHS=["January","February","March","April","May","June","July","August","September","October","November","December"];
var PRAYERS=[
  {key:'fajr',name:'Fajr',ar:'Ø§ÙÙØ¬Ø±',icon:'â½'},
  {key:'sunrise',name:'Sunrise',ar:'Ø§ÙØ´Ø±ÙÙ',icon:'â'},
  {key:'dhuhr',name:'Dhuhr',ar:'Ø§ÙØ¸ÙØ±',icon:'â¦'},
  {key:'asr',name:'Asr',ar:'Ø§ÙØ¹ØµØ±',icon:'â',hanafi:true},
  {key:'maghrib',name:'Maghrib',ar:'Ø§ÙÙØºØ±Ø¨',icon:'â'},
  {key:'isha',name:'Isha',ar:'Ø§ÙØ¹Ø´Ø§Ø¡',icon:'â'},
];
var EXTRAS=[
  {key:'midnight',name:'Islamic Midnight',ar:'ÙÙØªØµÙ Ø§ÙÙÙÙ Ø§ÙØ´Ø±Ø¹Ù',icon:'â'},
  {key:'lastThird',name:'Last Third of Night',ar:'Ø¢Ø®Ø± Ø«ÙØ« Ø§ÙÙÙÙ',icon:'â§'},
];
var SALAH=['fajr','sunrise','dhuhr','asr','maghrib','isha'];
var TIMES=null,NOWMIN=0;

function getAN(){
  if(!TIMES)return{};
  var active=null,next=null;
  for(var i=0;i<SALAH.length;i++){
    var curr=toNM(TIMES[SALAH[i]]);
    var nxt=i+1<SALAH.length?toNM(TIMES[SALAH[i+1]]):24*60+toNM(TIMES[SALAH[0]]);
    if(NOWMIN>=curr&&NOWMIN<nxt){active=SALAH[i];next=SALAH[(i+1)%SALAH.length];break;}
  }
  if(!active&&NOWMIN>=toNM(TIMES.isha)){active='isha';next='fajr';}
  if(!active)next='fajr';
  return{active:active,next:next};
}

function renderTimes(city){
  var today=new Date(),hijri=getHijri(today),an=getAN();
  document.getElementById('loc').textContent=city;
  var pRows='';
  for(var i=0;i<PRAYERS.length;i++){
    var p=PRAYERS[i],f=fmt12(TIMES[p.key]);
    var isA=p.key===an.active,isN=p.key===an.next;
    pRows+='<div class="row'+(isA?' active':'')+'" data-key="'+p.key+'">'
      +'<div class="icon">'+p.icon+'</div>'
      +'<div class="info">'
        +'<div class="pname">'+p.name
          +(p.hanafi?'<span class="hanafi-tag">HANAFI</span>':'')
          +(isN?'<span class="next-tag">NEXT</span>':'')
        +'</div>'
        +'<div class="pname-ar">'+p.ar+'</div>'
      +'</div>'
      +'<div class="ptime">'+f.disp+'<span class="ampm">'+f.ap+'</span></div>'
    +'</div>';
  }
  var eRows='';
  for(var j=0;j<EXTRAS.length;j++){
    var e=EXTRAS[j],fe=fmt12(TIMES[e.key]);
    eRows+='<div class="row">'
      +'<div class="icon">'+e.icon+'</div>'
      +'<div class="info"><div class="pname">'+e.name+'</div><div class="pname-ar">'+e.ar+'</div></div>'
      +'<div class="ptime">'+fe.disp+'<span class="ampm">'+fe.ap+'</span></div>'
    +'</div>';
  }
  document.getElementById('body').innerHTML=
    '<div class="datebar"><div>'
      +'<div class="hijri">'+hijri.day+' '+hijri.month+' '+hijri.year+' AH</div>'
      +'<div class="greg">'+DAYS[today.getDay()]+', '+today.getDate()+' '+MONTHS[today.getMonth()]+' '+today.getFullYear()+'</div>'
    +'</div><div class="badge">Hanafi Â· Umm Al-Qura</div></div>'
    +'<div class="section">Daily Prayers</div>'
    +pRows
    +'<div class="divider"></div>'
    +'<div class="section">Additional Times</div>'
    +eRows
    +'<div class="footer"><div class="fnote">Asr: Hanafi (2Ã shadow)<br>Midnight: Maghrib â Fajr</div><div id="clock"></div></div>';

  // clock
  (function tick(){
    var el=document.getElementById('clock');if(!el)return;
    var now=new Date(),h=now.getHours()%12||12,m=now.getMinutes(),s=now.getSeconds();
    el.textContent=h+':'+(m<10?'0':'')+m+':'+(s<10?'0':'')+s+' '+(now.getHours()>=12?'PM':'AM');
    NOWMIN=now.getHours()*60+now.getMinutes();
    setTimeout(tick,1000);
  })();

  // highlight update
  setInterval(function(){
    var an2=getAN();
    var rows=document.querySelectorAll('.row[data-key]');
    for(var i=0;i<rows.length;i++){
      var row=rows[i],k=row.dataset.key;
      row.classList.toggle('active',k===an2.active);
      var pn=row.querySelector('.pname'),old=pn.querySelector('.next-tag');
      if(old)old.remove();
      if(k===an2.next){var t=document.createElement('span');t.className='next-tag';t.textContent='NEXT';pn.appendChild(t);}
    }
  },60000);
}

if(!navigator.geolocation){
  document.getElementById('loc').textContent='Location unavailable';
  document.getElementById('body').innerHTML='<div class="warn">Your browser does not support geolocation.</div>';
}else{
  navigator.geolocation.getCurrentPosition(function(pos){
    var lat=pos.coords.latitude,lng=pos.coords.longitude;
    var tz=-new Date().getTimezoneOffset()/60;
    TIMES=calcTimes(new Date(),lat,lng,tz);
    fetch('https://nominatim.openstreetmap.org/reverse?lat='+lat+'&lon='+lng+'&format=json')
      .then(function(r){return r.json();})
      .then(function(j){
        var addr=j.address||{};
        var c=addr.city||addr.town||addr.village||addr.county||'Your Location';
        var co=addr.country||'';
        renderTimes(c+(co?', '+co:''));
      }).catch(function(){renderTimes('Your Location');});
  },function(){
    document.getElementById('loc').textContent='Location denied';
    document.getElementById('body').innerHTML='<div class="warn">â  Please allow location access and reload the page.</div>';
  },{timeout:10000});
}
</script>
